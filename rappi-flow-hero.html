<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rappi Courier Flow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.scene {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.phone-shell {
  width: 300px;
  height: 640px;
  position: relative;
  background: #1a1a1a;
  border-radius: 38px;
  padding: 10px 8px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    inset 0 0 0 1px rgba(255,255,255,0.04),
    0 2px 0 1px rgba(255,255,255,0.06),
    0 50px 120px rgba(0,0,0,0.9),
    0 20px 50px rgba(0,0,0,0.65);
}

.phone-shell::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 38px;
  border: 1.5px solid transparent;
  background: linear-gradient(160deg,
    rgba(255,255,255,0.14) 0%,
    rgba(255,255,255,0.03) 40%,
    rgba(255,255,255,0.00) 60%,
    rgba(255,255,255,0.08) 100%
  ) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 10;
}

.btn-power    { position:absolute; right:-3px; top:160px; width:3px; height:56px; background:#2a2a2a; border-radius:0 3px 3px 0; box-shadow:1px 0 2px rgba(0,0,0,0.5); }
.btn-vol-up   { position:absolute; left:-3px;  top:130px; width:3px; height:40px; background:#2a2a2a; border-radius:3px 0 0 3px; box-shadow:-1px 0 2px rgba(0,0,0,0.5); }
.btn-vol-down { position:absolute; left:-3px;  top:180px; width:3px; height:40px; background:#2a2a2a; border-radius:3px 0 0 3px; box-shadow:-1px 0 2px rgba(0,0,0,0.5); }

.punch-hole {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 12px;
  background: #1a1a1a;
  border-radius: 50%;
  z-index: 30;
  box-shadow: 0 0 0 1.5px rgba(255,255,255,0.06);
}

.screen-viewport {
  width: 100%;
  height: 100%;
  border-radius: 30px;
  overflow: hidden;
  position: relative;
  background: #fff;
}

/* 16px white top padding inside the screen */
.screen-inner {
  position: absolute;
  inset: 0;
  top: 8px;            /* <-- the 8px white gap at the top */
  overflow: hidden;
}

.screens-track {
  display: flex;
  width: 300%;
  height: 100%;
  will-change: transform;
}

.screen-slide {
  width: 284px;
  height: 100%;
  flex-shrink: 0;
  overflow: hidden;
}

.screen-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.tap-cursor {
  position: absolute;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  border: 2px solid rgba(0,0,0,0.2);
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transform: translate(-50%, -50%) scale(1);
  transition: opacity 0.15s ease, transform 0.08s ease;
}
.tap-cursor.visible { opacity: 1; }
.tap-cursor.pressed { transform: translate(-50%,-50%) scale(0.62); background: rgba(0,0,0,0.26); }
.tap-cursor.ripple  { animation: rippleOut 0.42s ease-out forwards; }
@keyframes rippleOut {
  0%   { transform: translate(-50%,-50%) scale(0.62); opacity: 0.5; }
  100% { transform: translate(-50%,-50%) scale(2.6);  opacity: 0; }
}

.screen-flash {
  position: absolute;
  inset: 0;
  background: #fff;
  pointer-events: none;
  z-index: 150;
  opacity: 0;
}

.scene-label {
  color: rgba(255,255,255,0.28);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
}

@media (prefers-reduced-motion: reduce) {
  .screens-track { transition: none !important; }
}
</style>
</head>

  <div class="scene-label">Gestión de pedido · Rappi Courier</div>
</div>

<script>
const PUSH_DUR      = 340;
const POP_DUR       = 260;
const READ_TIME     = 2000;
const PRE_TAP_DELAY = 500;
const TAP_HOLD      = 110;
const SETTLE        = 200;
const EASE          = 'cubic-bezier(0.32, 0.72, 0, 1)';

const track  = document.getElementById('track');
const cursor = document.getElementById('cursor');
const flash  = document.getElementById('flash');
const SW     = 284;

const sleep = ms => new Promise(r => setTimeout(r, ms));

function slideTo(idx, dur) {
  track.style.transition = `transform ${dur}ms ${EASE}`;
  track.style.transform  = `translateX(-${idx * SW}px)`;
}

async function showFlash() {
  flash.style.transition = 'opacity 0.05s';
  flash.style.opacity    = '0.18';
  await sleep(65);
  flash.style.transition = 'opacity 0.28s';
  flash.style.opacity    = '0';
}

async function tap(x, y) {
  cursor.style.left = x + 'px';
  cursor.style.top  = y + 'px';
  cursor.className  = 'tap-cursor visible';
  await sleep(PRE_TAP_DELAY);
  cursor.classList.add('pressed');
  await sleep(TAP_HOLD);
  cursor.classList.remove('pressed');
  cursor.classList.add('ripple');
  showFlash();
  await sleep(360);
  cursor.className = 'tap-cursor';
}

async function pushTo(idx, x, y) {
  await tap(x, y);
  await sleep(40);
  slideTo(idx, PUSH_DUR);
  await sleep(PUSH_DUR + SETTLE);
}

async function popTo(idx, x, y) {
  await tap(x, y);
  await sleep(40);
  slideTo(idx, POP_DUR);
  await sleep(POP_DUR + SETTLE);
}

// y coords offset by +16px to account for the top padding inside screen
async function runLoop() {
  track.style.transition = 'none';
  track.style.transform  = 'translateX(0)';
  await sleep(200);
  while (true) {
    await sleep(READ_TIME);
    await pushTo(1, 142, 143);   // 135 + 8
    await sleep(READ_TIME);
    await pushTo(2, 142, 273);   // 265 + 8
    await sleep(READ_TIME + 800);
    await popTo(1, 32, 68);      // 60 + 8
    await sleep(800);
    await popTo(0, 32, 68);
    await sleep(600);
  }
}

runLoop();
</script>
